  <style id="critical-site-css">
:root{
  --main-bg:#364379;
  --text:#ffffff;
  --muted:rgba(255,255,255,.75);
  --muted2:rgba(255,255,255,.65);
  --line:rgba(255,255,255,.14);
  --btn:#1d4ed8;
  --btn-hover:#1e40af;

  --container:1220px;
  --r12:12px;
  --r16:16px;
  --pill:999px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Noto Sans Georgian', system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f2f2f2;
  line-height:1.5;
}
/* Defensive: legacy cached homepage promo block must never be visible */
.home-seo{display:none !important;}
img{
  max-width:100%;
  height:auto;
}

/* nicer keyboard focus without ruining the look */
:focus-visible{
  outline:2px solid rgba(255,255,255,.6);
  outline-offset:3px;
  border-radius:10px;
}

/* ================= HEADER ================= */
.site-header{
  background:var(--main-bg);
  color:var(--text);
  border-bottom:1px solid rgba(255,255,255,.06);
  position:sticky;
  top:0;
  z-index:50;
}

.header-wrap{
  max-width:var(--container);
  margin:0 auto;
  padding:0 18px;
  height:64px;
  display:flex;
  align-items:center;
  gap:18px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:16px;
  min-width:260px;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  letter-spacing:.2px;
  white-space:nowrap;
}

.brand img{
  height:34px;
  width:auto;
  display:block;
}

.header-search{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--pill);
  padding:7px 12px;
  width:260px;
}

.header-search i{
  color:rgba(255,255,255,.75);
  font-size:14px;
}

.header-search input{
  border:0;
  outline:0;
  background:transparent;
  color:#fff;
  width:100%;
  font-size:14px;
  font-family:inherit;
}

.header-search input::placeholder{
  color:rgba(255,255,255,.65);
}

.header-nav{
  display:flex;
  align-items:center;
  gap:28px;
  margin:0 auto;
  height:100%;
}

.nav-item{
  position:relative;
  display:flex;
  align-items:center;
}
.nav-trigger{
  border:0;
  background:transparent;
  color:rgba(255,255,255,.78);
  text-decoration:none;
  font-size:14px;
  padding:8px 2px;
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
  font-family:inherit;
  white-space:nowrap;
}
.nav-trigger:hover{ color:#fff; }
.nav-caret{
  transition:transform .2s ease;
  display:inline-flex;
}
.nav-trigger[aria-expanded="true"] .nav-caret{ transform:rotate(180deg); }

.dropdown-menu{
  position:absolute;
  top:calc(100% + 10px);
  left:0;
  min-width:220px;
  padding:10px;
  border-radius:14px;
  background:#fff;
  border:1px solid rgba(11,18,32,.08);
  box-shadow:0 20px 40px rgba(2,8,20,.2);
  opacity:0;
  visibility:hidden;
  transform:translateY(8px);
  transition:opacity .18s ease, transform .18s ease, visibility .18s ease;
  z-index:60;
}
.dropdown-menu.open{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}

.header-nav a{
  color:rgba(255,255,255,.78);
  text-decoration:none;
  font-size:14px;
  padding:8px 2px;
  position:relative;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}

.header-nav a:hover{
  color:var(--btn);
  text-decoration:none;
}

.header-nav a.active{
  color:#fff;
}

.header-nav .dropdown-menu a{
  color:#000 !important;
}
.header-nav .dropdown-menu a:hover{
  color:#000 !important;
}
.header-nav .dropdown-menu a.active{
  color:#000 !important;
}

.header-nav a.active::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-14px;
  height:2px;
  background:var(--btn);
  border-radius:2px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:16px;
  margin-left:auto;
}

.lang-switch{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
}
.lang-btn{
  border:0;
  background:transparent;
  color:rgba(255,255,255,.8);
  font-size:12px;
  padding:7px 11px;
  border-radius:999px;
  cursor:pointer;
  font-weight:700;
}
.lang-btn[aria-pressed="true"]{
  background:linear-gradient(135deg, rgba(96,165,250,.45), rgba(59,130,246,.35));
  color:#fff;
}

.header-right a{
  color:rgba(255,255,255,.78);
  text-decoration:none;
  font-size:14px;
  white-space:nowrap;
}

.header-right a:hover{ color:#fff; }

.cta{
  background:var(--btn);
  color:#fff !important;
  padding:9px 18px;
  border-radius:var(--pill);
  font-weight:700;
  text-decoration:none;
}
.cta:hover{ background:var(--btn-hover); }

.burger{
  display:none;
  width:40px;
  height:40px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
  align-items:center;
  justify-content:center;
}

.mobile-panel{
  display:none;
  border-top:1px solid rgba(255,255,255,.10);
  background:var(--main-bg);
}
.mobile-panel.is-open{ display:block; }

.mobile-panel .inner{
  max-width:var(--container);
  margin:0 auto;
  padding:14px 18px 18px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.mobile-panel nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.mobile-panel nav a{
  color:rgba(255,255,255,.88);
  text-decoration:none;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
}
.mobile-panel nav a:hover{
  background:rgba(255,255,255,.14);
}

.mobile-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.mobile-actions a{
  text-decoration:none;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  color:#fff;
}
.mobile-actions a.cta{ background:var(--btn); }

@media (max-width: 1100px){
  .header-left{min-width:auto}
  .header-search{width:220px}
  .header-nav{gap:18px}
}

@media (max-width: 980px){
  .header-wrap{
    height:64px;
    flex-wrap:nowrap;
    padding:0 14px;
    gap:10px;
  }
  .header-left{
    min-width:0;
    flex:1;
  }
  .header-nav{display:none}
  .header-search{
    width:100%;
    max-width:320px;
  }
  .header-right{
    width:auto;
    justify-content:flex-end;
    margin-left:auto;
    gap:10px;
  }
  .header-right a{display:none}
  .header-right .lang-switch{display:none}
  .mobile-panel .lang-switch{
    display:flex;
    align-self:stretch;
    justify-content:center;
  }
  .burger{display:flex}
}

@media (max-width: 640px){
  .header-wrap{gap:10px}
  .header-left{flex:1; min-width:0;}
  .header-search{width:100%; max-width:none;}
  .header-right a{display:none}
  .mobile-panel .lang-switch{display:none}
}

/* ================= FOOTER ================= */
.site-footer{
  color:var(--text);
  background: var(--main-bg);
  margin-top:80px;
}

.footer-wrap{
  max-width:var(--container);
  margin:0 auto;
  padding: 0 18px;
}

.footer-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding: 22px 0;
}

.brand-footer{
  display:flex;
  align-items:center;
  gap:12px;
  min-width: 240px;
}
.brand-footer img{
  height:44px;
  width:auto;
  display:block;
}

.search{
  width: min(560px, 100%);
  display:flex;
  align-items:stretch;
  gap:10px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r16);
  padding:8px;
}
.search-shell{
  flex:1;
  min-width:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
}
.search-shell i{
  flex:0 0 auto;
  color:rgba(255,255,255,.7);
  font-size:14px;
}
.search input{
  flex:1;
  height:42px;
  border:0;
  outline:0;
  background: transparent;
  color: #fff;
  padding: 0;
  font-size:14px;
  font-family:inherit;
  min-width:0;
}
.search input::placeholder{ color: rgba(255,255,255,.6); }
.search button{
  height:42px;
  border:1px solid rgba(255,255,255,.2);
  padding: 0 18px;
  background: var(--btn);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  border-radius:12px;
}
.search button:hover{ background: var(--btn-hover); }

.divider{ border-top:1px solid var(--line); }

.footer-grid{
  display:grid;
  grid-template-columns: 1.25fr 1fr 1fr 1fr;
  gap: 22px;
  padding: 26px 0;
}
.footer-section{
  min-width:0;
}
.footer-section-toggle{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0;
  background:transparent;
  border:0;
  color:inherit;
  text-align:left;
  cursor:default;
}
.footer-section-title{
  display:block;
  margin:0 0 12px;
  font-size:13px;
  letter-spacing:.25px;
  text-transform:uppercase;
  color:rgba(255,255,255,.9);
}
.footer-section-arrow{
  display:none;
  flex:0 0 auto;
  color:#6f788d;
  transition:transform .2s ease;
}
.footer-section.is-open .footer-section-arrow{
  transform:rotate(90deg);
}
.footer-section-body{
  padding-top:0;
}
.about p{
  margin:0;
  color: rgba(255,255,255,.82);
  font-size:14px;
  line-height:1.6;
  max-width: 46ch;
}

.links{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.footer-section-list{
  margin:0;
  padding:0;
  list-style:none;
}
.links a{
  color: rgba(255,255,255,.82);
  text-decoration:none;
  font-size:14px;
  transition: color .15s ease, transform .15s ease;
  width: fit-content;
}
.links a:hover{
  color: var(--btn);
  transform: translateX(2px);
  text-decoration:none;
}

.social{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}
.social a{
  width:38px;
  height:38px;
  border-radius: 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-decoration:none;
  background: rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.10);
  transition: transform .15s ease, background .15s ease;
}
.social a:hover{
  background: rgba(255,255,255,.18);
  transform: translateY(-1px);
}

.footer-tail{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  padding: 16px 0 18px;
}
.contact{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.pill{
  display:flex;
  align-items:center;
  gap:10px;
  padding: 10px 12px;
  border: 1px solid rgba(255,255,255,.10);
  border-radius: var(--r12);
  color: rgba(255,255,255,.92);
  font-size:13px;
  white-space:nowrap;
}
.pill i{ color:#fff; }

.copy{
  color: rgba(255,255,255,.65);
  font-size:12.5px;
  line-height:1.45;
  text-align:right;
  max-width: 46ch;
}
.copy-link{
  color:#fff;
  font-weight:800;
  text-decoration:none;
  margin-right:6px;
}
.copy-link:hover{
  text-decoration:underline;
}

@media (max-width: 1024px){
  .footer-head{flex-direction:column;align-items:flex-start;}
  .search{width:100%;}
  .footer-grid{grid-template-columns: 1fr 1fr;}
  .copy{text-align:left;max-width:none;}
}
@media (max-width: 640px){
  .footer-head{gap:12px}
  .search{
    flex-direction:column;
    border-radius:14px;
  }
  .search-shell{
    width:100%;
    padding:0 12px;
  }
  .search input{
    height:44px;
    font-size:16px;
  }
  .search button{
    width:100%;
    height:44px;
  }
  .footer-grid{
    grid-template-columns: 1fr;
    gap:10px;
    padding:18px 0;
  }
  .footer-section{
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .footer-section-toggle{
    cursor:pointer;
    padding:14px 0;
    align-items:center;
  }
  .footer-section-title{
    margin:0;
    font-size:15px;
    text-transform:none;
    letter-spacing:0;
    color:#fff;
  }
  .footer-section-arrow{display:block;}
  .footer-section-body{
    display:none;
    padding:0 0 14px;
  }
  .footer-section.is-open .footer-section-body{display:block;}
  .footer-section-list{gap:12px;}
  .links a{
    width:100%;
    color:rgba(255,255,255,.72);
    font-size:14px;
  }
  .about p{
    max-width:none;
    color:rgba(255,255,255,.72);
  }
  .social{margin-top:16px;}
  .footer-tail{flex-direction:column;align-items:flex-start;}
  .pill{width:100%;}
  .copy{width:100%;}
}


/* news section */
.news-grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:14px;
}

.news-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 26px rgba(0,0,0,.08);
  border:1px solid rgba(0,0,0,.06);
}

.news-img{
  width:100%;
  height:170px;
  object-fit:cover;
  display:block;
}

.news-body{ padding:14px; }

.news-title{ font-weight:800; font-size:16px; margin-bottom:6px; }
.news-date{ font-size:12px; opacity:.65; margin-bottom:8px; }
.news-text{ font-size:13px; line-height:1.45; opacity:.85; }
.news-link{ display:inline-block; margin-top:10px; font-weight:800; color:#2563eb; }

.news-empty{
  background:#fff;
  border-radius:12px;
  padding:16px;
  border:1px solid rgba(0,0,0,.06);
}

@media (max-width: 980px){
  .news-grid{ grid-template-columns:1fr; }
}

</style>
  <style id="critical-slider-css">
/* ================= FULLSCREEN SLIDER ================= */

.hero{
  margin:0;
  padding:0;
}

.slider{
  position:relative;
  width:100%;
  height:calc(100vh - 64px); /* FULL SCREEN minus header */
  overflow:hidden;
  background:#0b0f2a;
}

/* track */
.slides{
  display:flex;
  height:100%;
  transition:transform .6s ease;
}

/* single slide */
.slide{
  min-width:100%;
  height:100%;
  position:relative;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* dark overlay */
.slide::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    rgba(0,0,0,.55),
    rgba(0,0,0,.15)
  );
}

/* text */
.slide-content{
  position:absolute;
  left:clamp(20px, 6vw, 80px);
  bottom:clamp(24px, 8vh, 80px);
  z-index:3;
  color:#fff;
  max-width:640px;
}

.slide-title{
  margin:0;
  font-size:clamp(22px, 4vw, 44px);
  font-weight:800;
  line-height:1.15;
}

.slide-link{
  display:inline-flex;
  margin-top:16px;
  padding:12px 20px;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  color:#fff;
  font-weight:700;
  text-decoration:none;
  backdrop-filter:blur(6px);
}
.slide-link:hover{
  background:rgba(255,255,255,.26);
}

/* arrows */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:48px;
  height:48px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.35);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:5;
}
.nav:hover{ background:rgba(0,0,0,.5); }

.nav.prev{ display: none; }
.nav.next{ display: none; }

/* dots bottom center */
.dots{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:18px;
  display:flex;
  gap:10px;
  z-index:6;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.5);
  border:0;
  cursor:pointer;
  transition:all .25s ease;
}

.dot.active{
  width:26px;
  border-radius:999px;
  background:#fff;
}

/* mobile adjustments */
@media (max-width:768px){
  .nav{ display:none; }
  .slide-content{ max-width:90%; }
}
@media (max-width:640px){
  .slider{
    height:calc(70vh - 64px);
    min-height:360px;
  }
  .slide-link{
    padding:10px 16px;
  }
}

  <script>
    async function inject(id, file) {
      const el = document.getElementById(id);
      if (!el) throw new Error(`Mount element not found: #${id}`);
      const res = await fetch(file + '?v=2', { cache: 'force-cache' });
      if (!res.ok) throw new Error(`${file} not found. Status: ${res.status}`);
      el.innerHTML = await res.text();
    }

    async function injectPhp(id, url) {
      const el = document.getElementById(id);
      if (!el) throw new Error(`Mount element not found: #${id}`);
      const res = await fetch(url + '?v=2', { cache: 'force-cache' });
      if (!res.ok) throw new Error(`${url} not found. Status: ${res.status}`);
      el.innerHTML = await res.text();
    }

    async function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src + '?v=2';
        s.onload = resolve;
        s.onerror = () => reject(new Error(`Failed to load script: ${src}`));
        document.body.appendChild(s);
      });
    }

    (async () => {
      try {
        const headerPromise = inject('siteHeaderMount', 'header.php');
        const appScriptPromise = loadScript('app.js');
        const newsPromise = injectPhp('newsMount', '/news_list.php');
        const footerPromise = inject('siteFooterMount', 'footer.php');

        await Promise.all([headerPromise, appScriptPromise]);
        if (typeof window.initHeader === 'function') window.initHeader();

        await newsPromise;
      } catch (err) {
        console.error(err);
      }
    })();
  </script>
