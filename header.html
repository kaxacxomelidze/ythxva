<!-- /youthagency/header.html -->
<link rel="stylesheet" href="/youthagency/assets/header.css">

<header class="site-header" id="siteHeader">
  <div class="header-wrap">
    <div class="header-left">
      <a class="brand" href="/youthagency/" aria-label="Youth Agency home">
        <img src="/youthagency/imgs/youthagency.png" alt="Youth Agency">
      </a>
    </div>

    <nav class="header-nav" aria-label="Primary navigation">
      <a href="/youthagency/" data-active="/youthagency/"><span data-i18n="nav.home">მთავარი</span></a>
      <a href="/youthagency/news/" data-active="/youthagency/news/"><span data-i18n="nav.news">სიახლეები</span></a>

      <div class="nav-item">
        <button class="nav-trigger" id="activitiesBtn" type="button" aria-expanded="false" aria-haspopup="true">
          <span data-i18n="nav.activities">აქტივობები</span>
          <span class="nav-caret" aria-hidden="true">▾</span>
        </button>

        <div class="dropdown-menu" id="activitiesMenu">
          <a href="/youthagency/camps/" data-active="/youthagency/camps/"><span data-i18n="nav.camps">ბანაკები</span></a>
          <a href="/youthagency/meetings/" data-active="/youthagency/meetings/"><span data-i18n="nav.meetings">შეხვედრები</span></a>
        </div>
      </div>

      <a href="/youthagency/grants/" data-active="/youthagency/grants/"><span data-i18n="nav.grants">საგრანტო</span></a>
      <a href="/youthagency/rules/" data-active="/youthagency/rules/"><span data-i18n="nav.rules">წესები</span></a>
    </nav>

    <div class="header-right">
      <div class="lang-switch" aria-label="Language switcher">
        <button class="lang-btn" data-lang="ka">KA</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>

      <a class="header-link" href="/youthagency/about/" data-active="/youthagency/about/"><span data-i18n="nav.about">ჩვენს შესახებ</span></a>
      <a class="cta" href="/youthagency/contact/" data-active="/youthagency/contact/"><span data-i18n="nav.contact">კონტაქტი</span></a>

      <button class="burger" id="burgerBtn" type="button" aria-expanded="false" aria-label="Open menu">
        <span aria-hidden="true">☰</span>
      </button>
    </div>
  </div>

  <div class="mobile-panel" id="mobilePanel">
    <div class="inner">
      <nav aria-label="Mobile navigation">
        <a href="/youthagency/" data-active="/youthagency/"><span data-i18n="nav.home">მთავარი</span></a>
        <a href="/youthagency/news/" data-active="/youthagency/news/"><span data-i18n="nav.news">სიახლეები</span></a>
        <a href="/youthagency/camps/" data-active="/youthagency/camps/"><span data-i18n="nav.camps">ბანაკები</span></a>
        <a href="/youthagency/meetings/" data-active="/youthagency/meetings/"><span data-i18n="nav.meetings">შეხვედრები</span></a>
        <a href="/youthagency/grants/" data-active="/youthagency/grants/"><span data-i18n="nav.grants">საგრანტო</span></a>
        <a href="/youthagency/rules/" data-active="/youthagency/rules/"><span data-i18n="nav.rules">წესები</span></a>
        <a href="/youthagency/about/" data-active="/youthagency/about/"><span data-i18n="nav.about">ჩვენს შესახებ</span></a>
        <a href="/youthagency/contact/" data-active="/youthagency/contact/"><span data-i18n="nav.contact">კონტაქტი</span></a>
      </nav>

      <div class="lang-switch mobile">
        <button class="lang-btn" data-lang="ka">KA</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </div>
</header>

<script>
  (function initHeaderFallback(){
    if (typeof window.initHeader === 'function') {
      window.initHeader();
      return;
    }
    const s = document.createElement('script');
    s.src = '/youthagency/app.js?v=2';
    s.onload = () => {
      if (typeof window.initHeader === 'function') window.initHeader();
    };
    document.body.appendChild(s);
  })();
</script>
